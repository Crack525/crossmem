<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Session boundary — dashed vertical line -->
  <line x1="60" y1="10" x2="60" y2="110" stroke="#666" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>

  <!-- Cross lines centered on the boundary (x=60, y=60) -->
  <line x1="30" y1="28" x2="90" y2="92" stroke="#E8912D" stroke-width="5" stroke-linecap="round"/>
  <line x1="30" y1="92" x2="90" y2="28" stroke="#E8912D" stroke-width="5" stroke-linecap="round"/>

  <!-- Wordmark: "cross" amber, "mem" light gray -->
  <text x="120" y="72" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="38" font-weight="500">
    <tspan fill="#E8912D">cross</tspan><tspan fill="#A0A0A0">mem</tspan>
  </text>
</svg>
